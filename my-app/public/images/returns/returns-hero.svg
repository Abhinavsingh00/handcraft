<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1920" height="1080" fill="url(#bg2)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="150" r="180" fill="#ec4899" opacity="0.1"/>
  <circle cx="1770" cy="180" r="160" fill="#f59e0b" opacity="0.1"/>
  <circle cx="1650" cy="880" r="200" fill="#3b82f6" opacity="0.1"/>
  <circle cx="250" cy="900" r="140" fill="#10b981" opacity="0.1"/>

  <!-- Large heart with dog face in center -->
  <g transform="translate(960, 540)">
    <!-- Heart shape -->
    <path d="M 0 80
             C -150 0, -200 -100, -120 -150
             C -60 -190, 0 -120, 0 -120
             C 0 -120, 60 -190, 120 -150
             C 200 -100, 150 0, 0 80 Z"
          fill="url(#heartGrad)" opacity="0.9"/>

    <!-- Dog face inside heart -->
    <g transform="translate(0, -10)">
      <!-- Face -->
      <ellipse cx="0" cy="0" rx="50" ry="45" fill="#fbbf24"/>

      <!-- Ears -->
      <ellipse cx="-35" cy="-35" rx="20" ry="35" fill="#d97706" transform="rotate(-20 -35 -35)"/>
      <ellipse cx="35" cy="-35" rx="20" ry="35" fill="#d97706" transform="rotate(20 35 -35)"/>

      <!-- Eyes -->
      <circle cx="-18" cy="-5" r="10" fill="#1f2937"/>
      <circle cx="18" cy="-5" r="10" fill="#1f2937"/>
      <circle cx="-15" cy="-8" r="4" fill="#ffffff"/>
      <circle cx="21" cy="-8" r="4" fill="#ffffff"/>

      <!-- Nose -->
      <ellipse cx="0" cy="12" rx="12" ry="8" fill="#1f2937"/>
      <ellipse cx="0" cy="10" rx="5" ry="3" fill="#4b5563"/>

      <!-- Mouth -->
      <path d="M -15 25 Q 0 35, 15 25" stroke="#1f2937" stroke-width="3" fill="none" stroke-linecap="round"/>

      <!-- Tongue -->
      <ellipse cx="0" cy="32" rx="8" ry="10" fill="#ec4899"/>
    </g>

    <!-- Sparkles around -->
    <g fill="#f59e0b">
      <polygon points="-140,-80 -135,-90 -130,-80 -135,-70" opacity="0.7"/>
      <polygon points="130,-100 135,-110 140,-100 135,-90" opacity="0.7"/>
      <polygon points="-100,60 -95,50 -90,60 -95,70" opacity="0.7"/>
      <polygon points="110,40 115,30 120,40 115,50" opacity="0.7"/>
    </g>
  </g>

  <!-- Floating elements -->
  <g transform="translate(180, 650) rotate(-10)">
    <rect x="0" y="0" width="80" height="80" rx="15" fill="#ec4899" opacity="0.5"/>
    <path d="M 20 40 Q 40 20, 60 40" stroke="white" stroke-width="4" fill="none" opacity="0.7"/>
  </g>

  <g transform="translate(1700, 700) rotate(15)">
    <rect x="0" y="0" width="70" height="70" rx="12" fill="#10b981" opacity="0.5"/>
    <path d="M 15 35 Q 35 15, 55 35" stroke="white" stroke-width="4" fill="none" opacity="0.7"/>
  </g>

  <g transform="translate(150, 250) rotate(8)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#8b5cf6" opacity="0.5"/>
    <path d="M 12 30 Q 30 12, 48 30" stroke="white" stroke-width="3" fill="none" opacity="0.7"/>
  </g>

  <g transform="translate(1650, 200) rotate(-12)">
    <rect x="0" y="0" width="55" height="55" rx="9" fill="#3b82f6" opacity="0.5"/>
    <path d="M 10 27 Q 27 10, 45 27" stroke="white" stroke-width="3" fill="none" opacity="0.7"/>
  </g>

  <!-- Paw prints -->
  <g fill="#ec4899" opacity="0.3">
    <circle cx="350" cy="450" r="15"/>
    <circle cx="375" cy="435" r="12"/>
    <circle cx="395" cy="455" r="12"/>
    <circle cx="370" cy="475" r="12"/>

    <circle cx="1520" cy="380" r="15"/>
    <circle cx="1545" cy="365" r="12"/>
    <circle cx="1565" cy="385" r="12"/>
    <circle cx="1540" cy="405" r="12"/>

    <circle cx="500" cy="800" r="12"/>
    <circle cx="520" cy="788" r="10"/>
    <circle cx="535" cy="803" r="10"/>
    <circle cx="515" cy="818" r="10"/>
  </g>

  <!-- Refresh/arrows icons suggesting returns/exchanges -->
  <g transform="translate(1400, 750)" opacity="0.4">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#ec4899" stroke-width="4"/>
    <polygon points="5,-10 5,-25 -10,-17" fill="#ec4899"/>
    <polygon points="-5,10 -5,25 10,17" fill="#ec4899"/>
  </g>
</svg>