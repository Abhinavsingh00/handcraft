<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0e7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef3c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1920" height="1080" fill="url(#bg1)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="150" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1720" cy="150" r="200" fill="#f59e0b" opacity="0.1"/>
  <circle cx="1600" cy="900" r="180" fill="#10b981" opacity="0.1"/>
  <circle cx="300" cy="850" r="120" fill="#8b5cf6" opacity="0.1"/>

  <!-- Large truck icon in center -->
  <g transform="translate(960, 540)">
    <!-- Truck body -->
    <rect x="-180" y="-100" width="280" height="160" rx="15" fill="url(#truckGrad)"/>
    <rect x="100" y="-60" width="100" height="120" rx="10" fill="#1e40af"/>
    <rect x="100" y="-90" width="100" height="35" rx="8" fill="#3b82f6"/>

    <!-- Windows -->
    <rect x="-160" y="-80" width="100" height="60" rx="8" fill="#93c5fd"/>
    <rect x="-50" y="-80" width="80" height="60" rx="8" fill="#93c5fd"/>

    <!-- Wheels -->
    <circle cx="-100" cy="70" r="40" fill="#1f2937"/>
    <circle cx="-100" cy="70" r="25" fill="#6b7280"/>
    <circle cx="120" cy="70" r="40" fill="#1f2937"/>
    <circle cx="120" cy="70" r="25" fill="#6b7280"/>

    <!-- Motion lines -->
    <rect x="250" y="-50" width="80" height="8" rx="4" fill="#3b82f6" opacity="0.4"/>
    <rect x="270" y="-20" width="60" height="8" rx="4" fill="#3b82f6" opacity="0.3"/>
    <rect x="260" y="10" width="70" height="8" rx="4" fill="#3b82f6" opacity="0.35"/>
    <rect x="280" y="40" width="50" height="8" rx="4" fill="#3b82f6" opacity="0.25"/>
  </g>

  <!-- Small package icons scattered -->
  <g transform="translate(150, 700) rotate(-15)">
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#f59e0b" opacity="0.6"/>
    <rect x="15" y="20" width="30" height="20" rx="4" fill="#fbbf24"/>
  </g>
  <g transform="translate(1750, 600) rotate(20)">
    <rect x="0" y="0" width="50" height="50" rx="6" fill="#10b981" opacity="0.6"/>
    <rect x="12" y="17" width="25" height="16" rx="3" fill="#34d399"/>
  </g>
  <g transform="translate(200, 300) rotate(10)">
    <rect x="0" y="0" width="45" height="45" rx="5" fill="#8b5cf6" opacity="0.5"/>
    <rect x="10" y="15" width="22" height="15" rx="3" fill="#a78bfa"/>
  </g>

  <!-- Paw prints -->
  <g fill="#f59e0b" opacity="0.3">
    <circle cx="400" cy="400" r="12"/>
    <circle cx="420" cy="390" r="10"/>
    <circle cx="435" cy="405" r="10"/>
    <circle cx="415" cy="420" r="10"/>

    <circle cx="1450" cy="350" r="12"/>
    <circle cx="1470" cy="340" r="10"/>
    <circle cx="1485" cy="355" r="10"/>
    <circle cx="1465" cy="370" r="10"/>
  </g>
</svg>